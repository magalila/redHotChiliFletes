<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Proveedor - redHotChiliFletes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>

<body class="bg-light">
  <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid px-4">
      <a href="dashboard.html" class="navbar-brand d-flex align-items-center h1 fst-italic mb-0">
        <img src="../../public/img/asterisk-red-hot-chili-peppers.gif" alt="Logo" width="35" height="35"
          class="d-inline-block align-top me-2">
        <span>redHotChili<span class="text-danger">Fletes</span></span>
      </a>
      <button class="btn btn-outline-danger btn-sm" onclick="logout()">Salir</button>
    </div>
  </nav>

  <div class="container px-4">
    <h2 class="mb-4 fw-bold text-primary">Panel del Proveedor</h2>

    <div class="row g-4">
      <div class="col-md-4">
        <div class="card shadow-sm border-0">
          <div class="card-body text-center">
            <h6 class="text-muted">Pedidos activos</h6>
            <h3 id="pedidos-activos" class="fw-bold text-primary">0</h3>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card shadow-sm border-0">
          <div class="card-body text-center">
            <h6 class="text-muted">Ganancia total</h6>
            <h3 id="ganancia-total" class="fw-bold text-success">$0</h3>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card shadow-sm border-0">
          <div class="card-body text-center">
            <h6 class="text-muted">Vehículos registrados cacaaaaaa</h6>
            <h3 id="vehiculos-registrados" class="fw-bold text-info">0</h3>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../../public/js/proveedor-dashboard.js"></script>
</body>
</html>
