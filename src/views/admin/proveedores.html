<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proveedores - redHotChiliFletes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>

<body class="bg-light">
  <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid px-4">
      <a href="dashboard.html" class="navbar-brand d-flex align-items-center h1 fst-italic mb-0">
        <img src="../../public/img/asterisk-red-hot-chili-peppers.gif" alt="Logo" width="35" height="35" class="d-inline-block align-top me-2">
        <span>redHotChili<span class="text-danger">Fletes</span></span>
      </a>
      <button class="btn btn-outline-danger btn-sm" onclick="logout()">Salir</button>
    </div>
  </nav>

  <div class="container-fluid px-4">
    <div class="card border-0 shadow-sm">
      <div class="card-header bg-white py-3">
        <h5 class="mb-0 text-primary">Listado de Proveedores Activos</h5>
      </div>
      <div id="tabla-proveedores-container" class="card-body">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="bg-light">
              <tr class="text-secondary small fw-bold">
                <th class="ps-3 border-0">PROVEEDOR / DETALLES</th>
                <th class="d-none d-md-table-cell border-0">D.N.I</th>
                <th class="text-center d-none d-md-table-cell border-0">FLOTA</th>
                <th class="text-end pe-3 border-0">ACCIONES</th>
              </tr>
            </thead>
            <tbody id="proveedores-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Template para cada fila -->
  <template id="proveedor-row-template">
    <tr>
      <td class="ps-3">
        <div class="d-flex align-items-center">
          <div class="bg-primary-subtle text-primary rounded-circle d-flex align-items-center justify-content-center me-2 d-none d-sm-flex" style="width: 32px; height: 32px; flex-shrink:0;">
            <span data-field="inicial"></span>
          </div>
          <div class="d-flex flex-column">
            <span class="fw-bold text-dark" data-field="nombre"></span>
            <div class="d-md-none small mt-1 d-flex align-items-center">
              <div style="width: 100px;" class="text-secondary flex-shrink-0">
                <i class="bi bi-card-text me-1"></i><span data-field="dni"></span>
              </div>
              <div class="ms-2">
                <span class="badge rounded-pill bg-info-subtle text-info border border-info-subtle" style="font-size: 0.7rem;">
                  <i class="bi bi-truck me-1"></i><span data-field="flota-count"></span>
                </span>
              </div>
            </div>
          </div>
        </div>
      </td>
      <td class="d-none d-md-table-cell text-secondary" data-field="dni"></td>
      <td class="text-center d-none d-md-table-cell">
        <span class="badge rounded-pill bg-info-subtle text-info border border-info-subtle">
          <span data-field="flota-count"></span> móviles
        </span>
      </td>
      <td class="text-end pe-3">
        <div class="d-flex justify-content-end gap-2">
          <button class="btn btn-sm btn-outline-primary d-flex align-items-center" data-action="detalles">
            <i class="bi bi-person-lines-fill"></i>
            <span class="d-none d-md-inline ms-1">Detalles</span>
          </button>
          <button class="btn btn-sm btn-outline-danger d-flex align-items-center" data-action="eliminar">
            <i class="bi bi-trash3"></i>
            <span class="d-none d-md-inline ms-1">Eliminar</span>
          </button>
        </div>
      </td>
    </tr>
  </template>

  <script src="../../public/js/proveedores.js"></script>
</body>
</html>
