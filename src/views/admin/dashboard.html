<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - redHotChiliFletes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

</head>

<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container-fluid px-4">
            <a href="../../views/admin/dashboard.html" class="navbar-brand d-flex align-items-center h1 fst-italic mb-0" >
                <img src="../../public/img/asterisk-red-hot-chili-peppers.gif" alt="Logo" width="35" height="35"
                    class="d-inline-block align-top me-2">

                <span>redHotChili<span class="text-danger">Fletes</span></span>
            </a>

            <div class="d-flex align-items-center">
                <span class="text-white me-3 d-none d-md-inline small">Bienvenida, Admin</span>
                <button class="btn btn-outline-danger btn-sm" onclick="logout()">Salir</button>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4">
        <h2 class="mb-4">Resumen de Operaciones</h2>

        <!-- Fila de KPI Cards -->
        <div class="row g-3 mb-5">
            <!-- Total Movido -->
            <div class="col-12 col-md-4">
                <div class="card border-0 shadow-sm">
                    <div class="card-body">
                        <h6 class="card-subtitle mb-2 text-muted uppercase">Total Transaccionado</h6>
                        <h3 class="card-title mb-0" id="total-movido">$0,00</h3>
                        <small class="text-success"><i class="bi bi-graph-up"></i> Flujo total en Neon</small>
                    </div>
                </div>
            </div>

            <!-- Ganancia Plataforma -->
            <div class="col-12 col-md-4">
                <div class="card border-0 shadow-sm border-start border-danger border-4">
                    <div class="card-body">
                        <h6 class="card-subtitle mb-2 text-muted">Comisión Plataforma (15%)</h6>
                        <h3 class="card-title mb-0 text-danger" id="ganancia-plataforma">$0,00</h3>
                        <small class="text-muted">Ganancia neta estimada</small>
                    </div>
                </div>
            </div>

            <!-- Total Pedidos -->
            <div class="col-12 col-md-4">
                <div class="card border-0 shadow-sm">
                    <div class="card-body">
                        <h6 class="card-subtitle mb-2 text-muted">Órdenes Totales</h6>
                        <h3 class="card-title mb-0" id="total-pedidos">0</h3>
                        <small class="text-primary">Volumen de actividad</small>
                    </div>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-12">
                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-header bg-white py-3">
                        <h5 class="mb-0 text-dark">Gestión de Flota Pendiente</h5>
                    </div>
                    <div class="card-body">
                        <div class="row g-3 justify-content-center">
                            <div class="col-12 col-md-8">
                                <div class="input-group shadow-sm">
                                    <span class="input-group-text bg-white border-end-0">
                                        <i class="bi bi-search text-muted"></i>
                                    </span>
                                    <input type="text" id="buscador-input" class="form-control border-start-0 ps-0"
                                        placeholder="Escribí un nombre o una patente...">
                                    <button class="btn btn-danger" type="button" onclick="limpiarBuscador()">
                                        <i class="bi bi-x-lg"></i>
                                    </button>
                                </div>
                            </div>

                            <div class="col-12 col-md-4">
                                <button class="btn btn-dark w-100 shadow-sm" type="button"
                                    onclick="mostrarProveedores()">
                                    <i class="bi bi-people-fill me-2"></i> Ver Proveedores
                                </button>
                            </div>

                        </div>

                        <div id="info-busqueda" class="form-text text-center mt-2 d-none">
                            Mostrando resultados filtrados...
                        </div>
                    </div>

                    <div id="tabla-vehiculos-container" class=""> </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Tu script de fetch -->
    <script src="../../public/js/admin-dashboard.js"></script>
</body>

</html>
