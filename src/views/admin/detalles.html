<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalles del Proveedor - redHotChiliFletes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>

<body class="bg-light">
  <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid px-4">
      <a href="dashboard.html" class="navbar-brand d-flex align-items-center h1 fst-italic mb-0">
        <img src="../../public/img/asterisk-red-hot-chili-peppers.gif" alt="Logo" width="35" height="35"
          class="d-inline-block align-top me-2">
        <span>redHotChili<span class="text-danger">Fletes</span></span>
      </a>
      <button class="btn btn-outline-danger btn-sm" onclick="logout()">Salir</button>
    </div>
  </nav>

  <div class="container-fluid px-4">
    <button class="btn btn-outline-secondary btn-sm d-flex align-items-center mb-2" onclick="volverAProveedores()">
      <i class="bi bi-arrow-left"></i> </button>
    <h2 id="nombre-proveedor" class="mb-4 fw-bold"></h2>


    <!-- Datos personales -->
    <div id="datos-personales" class="card border-0 shadow-sm mb-4"></div>

    <!-- Filtro y flota -->
    <div class="card border-0 shadow-sm mb-4">
      <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
        <h6 class="mb-0 text-primary"><i class="bi bi-truck me-2"></i>Flota de Vehículos</h6>
        <span id="contador-vehiculos" class="badge bg-primary-subtle text-primary rounded-pill"></span>
      </div>
      <div class="card-body p-2 px-md-4">
        <!-- Filtro alineado en fila -->
        <div class="mb-3 d-flex align-items-center gap-2">
          <label for="filtro-estado" class="form-label small text-muted mb-0">
            Filtrar por estado:
          </label>
          <select id="filtro-estado" class="form-select form-select-sm w-auto">
            <option value="todos">Todos</option>
            <option value="APROBADO">Aprobados</option>
            <option value="RECHAZADO">Rechazados</option>
            <option value="PENDIENTE">Pendientes</option>
          </select>
        </div>

        <!-- Contenedor de flota -->
        <div id="lista-vehiculos-proveedor"></div>
      </div>

    </div>
  </div>

  <!-- Templates -->
  <template id="vehiculo-row-template">
    <div class="card mb-3 border-0 shadow-sm border-start border-4" data-field="border">
      <div class="card-body d-flex justify-content-between align-items-center">
        <div>
          <span class="badge mb-2" data-field="estado"></span>
          <h5 data-field="modelo"></h5>
          <p class="mb-0 text-muted small">Patente: <strong data-field="patente"></strong> | Tipo: <span
              data-field="tipo"></span></p>
        </div>
      </div>
    </div>
  </template>

  <script src="../../public/js/detalles.js"></script>
</body>

</html>
