<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalles del Vehículo - redHotChiliFletes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>

<body class="bg-light">
  <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid px-4">
      <a href="dashboard.html" class="navbar-brand d-flex align-items-center h1 fst-italic mb-0">
        <img src="../../public/img/asterisk-red-hot-chili-peppers.gif" alt="Logo" width="35" height="35" class="d-inline-block align-top me-2">
        <span>redHotChili<span class="text-danger">Fletes</span></span>
      </a>
      <button class="btn btn-outline-danger btn-sm" onclick="logout()">Salir</button>
    </div>
  </nav>

  <div class="container px-4">
    <div class="d-flex align-items-center justify-content-between mb-3">
      <button class="btn btn-outline-secondary btn-sm d-flex align-items-center" onclick="volverAProveedor()">
        <i class="bi bi-arrow-left me-1"></i> Volver
      </button>
      <h4 id="titulo-vehiculo" class="fw-bold text-primary mb-0"></h4>
    </div>

    <!-- Datos del vehículo -->
    <div id="datos-vehiculo" class="card border-0 shadow-sm mb-4 p-3"></div>

    <!-- Documentos -->
    <div class="card border-0 shadow-sm mb-4">
      <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
        <h6 class="mb-0 text-primary"><i class="bi bi-file-earmark-text me-2"></i>Documentos del Vehículo</h6>
      </div>
      <div class="card-body">
        <ul class="list-group list-group-flush" id="documentos-lista"></ul>
      </div>
    </div>
  </div>

  <script src="../../public/js/vehiculo-detalle.js"></script>
</body>
</html>
