<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Usuario - redHotChiliFletes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
  <div class="container mt-5">
    <h3 class="text-center mb-4 fw-bold">Registro de Usuario</h3>

    <form id="registroForm" enctype="multipart/form-data" method="POST" class="card p-4 shadow-sm border-0">
      <h5 class="mb-3 text-primary">Datos personales</h5>

      <div class="mb-3">
        <label class="form-label">Nombre completo</label>
        <input type="text" class="form-control" id="nombre" required>
      </div>

      <div class="mb-3">
        <label class="form-label">DNI</label>
        <div class="input-group">
          <input type="text" class="form-control" id="dni" required>
          <input type="file" accept="application/pdf" class="form-control" id="dniPdf" required>
          <button type="button" class="btn btn-outline-info" id="verDniPdf">Vista previa</button>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Celular</label>
        <input type="tel" class="form-control" id="telefono" pattern="[0-9]{10}" required placeholder="Ej: 3764123456">
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" id="email" required placeholder="Ej: usuario@correo.com">
      </div>

      <div class="mb-3">
        <label class="form-label">Foto de perfil (JPEG)</label>
        <div class="input-group">
          <input type="file" accept="image/jpeg" class="form-control" id="fotoPerfil" required>
          <button type="button" class="btn btn-outline-info" id="verFoto" data-bs-toggle="modal"
            data-bs-target="#previewModal">Vista previa</button>
        </div>
        <small class="text-muted">Una foto reciente de rostro completo, clara y sin lentes de sol.</small>
      </div>

      <h5 class="mt-4 mb-3 text-primary">Documentos adicionales</h5>

      <div class="mb-3">
        <label class="form-label">Certificado de antecedentes (PDF)</label>
        <div class="input-group">
          <input type="file" accept="application/pdf" class="form-control" id="certificadoAntecedente" required>
          <button type="button" class="btn btn-outline-info" id="verCertificado">Vista previa</button>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Licencia de conducir (PDF)</label>
        <div class="input-group">
          <input type="file" accept="application/pdf" class="form-control" id="licenciaConducir" required>
          <button type="button" class="btn btn-outline-info" id="verLicencia">Vista previa</button>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <input type="password" class="form-control" id="password" required minlength="6"
          placeholder="Mínimo 6 caracteres">
      </div>

      <button type="submit" class="btn btn-success w-100 mt-3">Registrar</button>
    </form>
  </div>

  <!-- Modal Bootstrap para imagen -->
  <div class="modal fade" id="previewModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Vista previa de foto</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body text-center">
          <img id="previewImage" src="" class="img-fluid rounded" alt="Vista previa" />
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Bootstrap para PDFs -->
  <div class="modal fade" id="pdfModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Vista previa de documento</h5>
          <button type="button" class="btn btn-primary" id="downloadPdf">Descargar</button>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <iframe id="pdfViewer" src="" width="100%" height="600px" style="border:none;"></iframe>
        </div>
      </div>
    </div>
  </div>
  <script src="../../src/public/js/register.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
