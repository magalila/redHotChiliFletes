<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel del Proveedor - redHotChiliFletes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
  <div class="container-fluid">
    <div class="row">
      <!-- Sidebar -->
      <div class="col-md-3 col-lg-2 bg-dark text-white p-3 vh-100">
        <h4 class="fw-bold mb-4">Proveedor</h4>
        <ul class="nav flex-column">
          <li class="nav-item"><span class="nav-link text-white">Panel general</span></li>
        </ul>
      </div>

      <!-- Contenido principal -->
      <div class="col-md-9 col-lg-10 p-4" id="contenido">
        <h3 class="fw-bold text-primary mb-4">Datos del proveedor</h3>

        <!-- Datos personales -->
        <div class="card p-4 shadow-sm border-0 mb-4">
          <h5 class="text-primary mb-3">Datos personales</h5>
          <p><strong>Nombre:</strong> <span id="nombre"></span></p>
          <p><strong>DNI:</strong> <span id="dni"></span></p>
          <p><strong>Correo electrónico:</strong> <span id="email"></span></p>
          <p><strong>Teléfono:</strong> <span id="telefono"></span></p>
          <p><strong>Fecha de creación:</strong> <span id="fechaCreacion"></span></p>
        </div>

        <!-- Documentos -->
        <div class="card p-4 shadow-sm border-0 mb-4">
          <h5 class="text-primary mb-3">Documentos</h5>
          <ul class="list-group">
            <li class="list-group-item">
              Foto de perfil:
              <img id="fotoPerfil" src="" alt="Foto perfil" width="100">
            </li>
            <li class="list-group-item">
              DNI (PDF):
              <a id="dniPdf" href="#" target="_blank" class="btn btn-sm btn-outline-info ms-2">Ver PDF</a>
            </li>
            <li class="list-group-item">
              Certificado de antecedentes:
              <a id="certificadoAntecedente" href="#" target="_blank" class="btn btn-sm btn-outline-info ms-2">Ver PDF</a>
            </li>
            <li class="list-group-item">
              Licencia de conducir:
              <a id="licenciaConducir" href="#" target="_blank" class="btn btn-sm btn-outline-info ms-2">Ver PDF</a>
            </li>
          </ul>
        </div>

        <!-- Vehículos -->
        <div class="card p-4 shadow-sm border-0">
          <h5 class="text-primary mb-3">Vehículos registrados</h5>
          <div id="vehiculos-container" class="mt-3"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../public/js/proveedor-dashboard.js"></script>
</body>
</html>
